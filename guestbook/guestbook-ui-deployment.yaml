apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-ui
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook-ui
  template:
    metadata:
      labels:
        app: guestbook-ui
    spec:
      containers:
        - image: ghcr.io/kubernetes-sigs/gb-frontend-arm64:v5
          name: guestbook-ui
          ports:
            - containerPort: 80